<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试记录 - AI招聘分析</title>
    
    <script>
        (function(){ var cfg = { url: 'https://ccmqalcmkjbbrbzcmrxf.supabase.co', anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjbXFhbGNta2piYnJiemNtcnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzgwNTMsImV4cCI6MjA5MTExNDA1M30.3EqI1wE0MAvFFbprG-hBZqjMwRVfkStiBf-rADTko_M' }; window.__SUPABASE_CONFIG = cfg; })();

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .header-info {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 14px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
        }
        
        .btn-primary {
            background: white;
            color: #667eea;
            font-weight: 600;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .record-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .card-meta {
            font-size: 13px;
            color: #999;
        }
        
        .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .section {
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-content {
            font-size: 14px;
            line-height: 1.95;
            color: #374151;
            background: #f8fafc;
            padding: 18px 22px;
            border-radius: 12px;
        }
        #resumeReportContent { max-height: 600px; overflow-y: auto; }
        .section-content h1 { font-size: 22px; font-weight: 700; margin: 8px 0 12px; color: #1f2937; }
        .section-content h2 { font-size: 18px; font-weight: 700; margin: 14px 0 10px; color: #1f2937; }
        .section-content h3 { font-size: 16px; font-weight: 600; margin: 12px 0 8px; color: #374151; }
        .section-content p { margin: 8px 0 10px; }
        .section-content ul, .section-content ol { padding-left: 22px; margin: 8px 0 12px; }
        .section-content li { margin: 6px 0; }
        .section-content table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; background: white; }
        .section-content table th, .section-content table td { border: 1px solid #e5e7eb; padding: 10px 12px; text-align: left; }
        .section-content table thead th { background: #eef2ff; color: #334155; }
        .section-content hr { height: 1px; border: none; background: #e5e7eb; margin: 16px 0; }
        .section-content blockquote { border-left: 4px solid #93c5fd; background: #f0f9ff; padding: 10px 12px; border-radius: 8px; color: #1e3a8a; margin: 10px 0; }
        .section-content code { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 2px 6px; border-radius: 4px; }
        .section-content pre { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 10px 12px; border-radius: 8px; overflow: auto; }
        .transcript-text-block { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px 18px; line-height: 1.95; white-space: pre-wrap; word-break: break-word; }
        
        .transcript-timeline { max-height: 600px; overflow-y: auto; }
        #timelineBox { max-height: 600px; overflow-y: auto; }
        .transcript-text-block { max-height: 600px; overflow-y: auto; }
        
        .transcript-item {
            margin-bottom: 12px;
            padding: 10px;
            background: white;
            border-left: 3px solid #667eea;
            border-radius: 4px;
        }
        
        .transcript-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }
        
        .notes-box {
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .score-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .highlight-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .annotation-target { background:#fff3cd; }
        .annotation-note { display:inline-block; margin-left:6px; padding:2px 6px; border-radius:12px; background:#fde68a; color:#5b3e00; font-size:12px; border:1px solid #f59e0b; }
        .annotate-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .annotate-btn { padding:6px 10px; font-size:12px; background:#e5e7eb; color:#111827; border:1px solid #d1d5db; border-radius:8px; cursor:pointer; }
        .annotate-btn.active { background:#fde68a; border-color:#f59e0b; color:#5b3e00; }
        .ai-analysis-card .section-content { }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 面试记录详情</h1>
        <div class="header-info">
            <button class="btn btn-secondary" onclick="(function(){window.location.href='/my-reports.html';})()">返回我的报告</button>
        </div>
    </div>
    
    <div class="container">
        <!-- 简历分析报告 -->
        <div class="record-card">
          <div class="card-header">
            <div class="card-title">📄 简历分析报告</div>
            <div class="card-meta" id="resumeGenTime"></div>
          </div>
          <div class="card-body">
                <div class="section full-width">
                  <div class="section-title">📄 简历分析报告</div>
                  <div class="annotate-toolbar"><button id="annotateToggleBtnRecord" class="annotate-btn">备注编辑模式</button></div>
                  <div class="section-content" id="resumeReportContent"></div>
                </div>
          </div>
        </div>
        
        <!-- 面试实录 -->
        <div class="record-card">
          <div class="card-header">
            <div class="card-title">🎤 面试语音转文字记录</div>
            <div class="card-meta"></div>
          </div>
          <div class="card-body">
            <div class="section full-width">
              <div class="section-title">💬 完整对话记录</div>
              <div class="section-content transcript-timeline" id="timelineBox"></div>
            </div>
          </div>
        </div>
        
        <!-- 面试笔记 -->
        <div class="record-card">
            <div class="card-header">
                <div class="card-title">📝 面试笔记</div>
                <div class="card-meta"></div>
            </div>
            <div class="card-body">
                <div class="section full-width">
                    <div class="section-content notes-box" id="notesBox"></div>
                </div>
            </div>
        </div>
        
        <!-- AI综合分析 -->
        <div class="record-card ai-analysis-card">
            <div class="card-header">
                <div class="card-title">🤖 AI综合面试分析</div>
                <div class="card-meta"></div>
            </div>
            <div class="card-body">
                <div class="section full-width">
                    <div class="section-content ai-analysis-content"></div>
                </div>
            </div>
        </div>
        
        <!-- 操作按钮 -->
    <div class="action-buttons">
            <button class="btn btn-primary" id="saveToMyReportsBtn">💾 保存到我的报告</button>
            <button class="btn btn-primary" id="exportRecordDocxBtn">📥 导出 Word</button>
            <button class="btn btn-secondary" id="exportRecordPdfBtn">🖨️ 导出 PDF</button>
            <button class="btn btn-secondary" id="shareRecordBtn">📤 分享</button>
        </div>
    </div>

  <div class="toast" id="toast"></div>

  <!-- 登录与注册弹窗代码注入 -->
  <div class="modal-overlay" id="login-modal" style="display:none;">
    <div class="modal-panel login-panel">
      <div class="modal-header">
        <h3>登录你的账号</h3>
        <button class="modal-close" onclick="closeLoginModal()" aria-label="关闭">×</button>
      </div>
      <p class="modal-subtitle">使用邮箱登录或注册</p>
      <div id="login-error" class="error-state" style="display:none;"></div>
      <div class="form-group">
        <label for="login-email">邮箱</label>
        <div class="input-with-icon"><i class="fas fa-envelope"></i><input type="email" id="login-email" placeholder="you@example.com" autocomplete="username" /></div>
      </div>
      <div class="form-group" id="login-password-group">
        <label for="login-password">密码</label>
        <div class="input-with-icon"><i class="fas fa-lock"></i><input type="password" id="login-password" placeholder="不少于6位" autocomplete="current-password" /><button type="button" class="input-action" onclick="(function(btn){const input=document.getElementById('login-password');const s=input.getAttribute('type')==='password'?'text':'password';input.setAttribute('type',s);btn.innerText=s==='password'?'显示':'隐藏';})(this)">显示</button></div>
      </div>
      <div class="form-group" id="login-otp-group" style="display:none;">
        <label for="login-otp">验证码</label>
        <div class="input-with-icon"><i class="fas fa-key"></i><input type="text" id="login-otp" placeholder="6位验证码" autocomplete="one-time-code" /></div>
      </div>
      <div class="form-group" id="login-remember-group" style="display:flex;gap:1rem;align-items:center;">
        <label class="filter-checkbox" style="display:flex;align-items:center;gap:0.5rem;"><input type="checkbox" id="remember-email" /><span>记住账号</span></label>
        <label class="filter-checkbox" style="display:flex;align-items:center;gap:0.5rem;"><input type="checkbox" id="remember-password" /><span>记住密码</span></label>
      </div>
      <div class="modal-actions" id="login-actions">
        <button class="btn-primary" onclick="handleEmailLogin()"><i class="fas fa-sign-in-alt"></i>登录</button>
        <button class="btn-secondary" onclick="openRegisterModal()"><i class="fas fa-user-plus"></i>注册</button>
      </div>
      <div class="modal-help"><a href="#" class="forgot-password-link" onclick="(function(){if(window.openForgotMode) window.openForgotMode();})(); return false;">忘记密码？</a></div>
      <div class="modal-actions" id="forgot-actions" style="display:none;">
        <button class="btn-primary" onclick="handleForgotPassword()"><i class="fas fa-envelope"></i>发送验证码</button>
        <button class="btn-secondary" onclick="(function(){if(window.switchLoginMode) window.switchLoginMode('login');})();"><i class="fas fa-sign-in-alt"></i>返回登录</button>
      </div>
      <div class="modal-actions" id="verify-otp-actions" style="display:none;">
        <button class="btn-primary" onclick="handleVerifyOtp()"><i class="fas fa-check-circle"></i>验证并重置密码</button>
        <button class="btn-secondary" onclick="(function(){if(window.switchLoginMode) window.switchLoginMode('forgot');})();"><i class="fas fa-arrow-left"></i>重新发送</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="register-modal" style="display:none;">
    <div class="modal-panel login-panel">
      <div class="modal-header"><h3>注册新账号</h3><button class="modal-close" onclick="closeRegisterModal()" aria-label="关闭">×</button></div>
      <p class="modal-subtitle">填写邮箱与密码完成注册</p>
      <div id="register-error" class="error-state" style="display:none;"></div>
      <div class="form-group"><label for="register-email">邮箱</label><div class="input-with-icon"><i class="fas fa-envelope"></i><input type="email" id="register-email" placeholder="you@example.com" autocomplete="username" /></div></div>
      <div class="form-group"><label for="register-password">密码</label><div class="input-with-icon"><i class="fas fa-lock"></i><input type="password" id="register-password" placeholder="不少于6位" autocomplete="new-password" /></div></div>
      <div class="form-group"><label for="register-password-confirm">确认密码</label><div class="input-with-icon"><i class="fas fa-lock"></i><input type="password" id="register-password-confirm" placeholder="再次输入" autocomplete="new-password" /></div></div>
      <div class="modal-actions"><button class="btn-primary" onclick="handleEmailSignupRegister()"><i class="fas fa-user-plus"></i>注册</button><button class="btn-secondary" onclick="(function(){closeRegisterModal();openLoginModal();})()"><i class="fas fa-sign-in-alt"></i>返回登录</button></div>
    </div>
  </div>
  <div class="modal-overlay" id="reset-modal" style="display:none;">
    <div class="modal-panel login-panel">
      <div class="modal-header"><h3>重置密码</h3><button class="modal-close" onclick="closeResetModal()" aria-label="关闭">×</button></div>
      <p class="modal-subtitle">请设置一个新的密码</p>
      <div class="form-group"><label for="reset-password">新密码</label><div class="input-with-icon"><i class="fas fa-lock"></i><input type="password" id="reset-password" placeholder="不少于6位" autocomplete="new-password" /></div></div>
      <div class="form-group"><label for="reset-password-confirm">确认新密码</label><div class="input-with-icon"><i class="fas fa-lock"></i><input type="password" id="reset-password-confirm" placeholder="再次输入" autocomplete="new-password" /></div></div>
      <div class="modal-actions"><button class="btn-primary" onclick="handlePasswordUpdate()"><i class="fas fa-key"></i>更新密码</button></div>
    </div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/interview.js"></script>
</body>
</html>
